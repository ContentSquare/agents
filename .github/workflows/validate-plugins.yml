name: plugin

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate manifests, catalogs, MCP configs and skills
        run: node scripts/validate-plugins.mjs

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate Claude Code plugins
        run: |
          shopt -s nullglob
          for dir in plugins/*/; do
            [[ -f "${dir}.claude-plugin/plugin.json" ]] || continue
            echo "--- validating $dir ---"
            claude plugin validate "$dir"
          done

      - name: Check generated copies are in sync
        run: |
          ./scripts/sync-plugin.sh
          if ! git diff --quiet; then
            echo "::error::Generated plugin copies are out of sync with their authored sources."
            echo "Run ./scripts/sync-plugin.sh and commit the result."
            git --no-pager diff --stat
            exit 1
          fi
